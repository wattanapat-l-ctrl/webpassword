<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iSafe Cloud Pro - Windows 11</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <style>
        :root {
            --accent: #0078d4; --bg-blur: rgba(255, 255, 255, 0.65);
            --card-bg: rgba(255, 255, 255, 0.85); --text-main: #1b1b1b;
            --border-color: rgba(0, 0, 0, 0.1); --sidebar-bg: rgba(255, 255, 255, 0.35);
        }
        * { box-sizing: border-box; transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); }
        body {
            background: url('https://images.unsplash.com/photo-1620121692029-d088224efc74?q=80&w=2064&auto=format&fit=crop') no-repeat center center fixed;
            background-size: cover; height: 100vh; margin: 0; display: flex; justify-content: center; align-items: center;
            font-family: 'Segoe UI Variable', 'Segoe UI', sans-serif; overflow: hidden;
        }

        .window {
            width: 1000px; height: 650px; background: var(--bg-blur); backdrop-filter: blur(40px) saturate(180%);
            border-radius: 12px; border: 1px solid rgba(255, 255, 255, 0.4); box-shadow: 0 30px 60px rgba(0,0,0,0.3);
            display: flex; flex-direction: column; overflow: hidden;
        }

        .title-bar { padding: 12px 20px; display: flex; justify-content: space-between; align-items: center; background: rgba(255, 255, 255, 0.15); }
        .app-body { display: flex; flex: 1; overflow: hidden; }

        /* Sidebar */
        .sidebar { width: 240px; background: var(--sidebar-bg); padding: 15px; border-right: 1px solid var(--border-color); display: flex; flex-direction: column; }
        .nav-item { padding: 10px 15px; border-radius: 8px; margin-bottom: 4px; cursor: pointer; display: flex; align-items: center; gap: 12px; font-size: 14px; color: #333; }
        .nav-item:hover { background: rgba(255, 255, 255, 0.4); }
        .nav-item.active { background: white; box-shadow: 0 2px 8px rgba(0,0,0,0.05); color: var(--accent); font-weight: 600; }
        
        #trashBin { margin-top: auto; color: #d83b01; font-weight: 600; border: 2px dashed transparent; }
        #trashBin.drag-over { background: rgba(216, 59, 1, 0.15); border: 2px dashed #d83b01; transform: scale(1.05); }

        /* Content Area */
        .content { flex: 1; padding: 25px; overflow-y: auto; background: rgba(255, 255, 255, 0.05); }
        .search-box { width: 100%; padding: 10px 15px; border-radius: 8px; border: 1px solid var(--border-color); background: white; outline-color: var(--accent); margin-bottom: 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }

        /* Card Styles */
        .password-card { background: var(--card-bg); border: 1px solid var(--border-color); border-radius: 10px; padding: 16px; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; cursor: grab; box-shadow: 0 2px 5px rgba(0,0,0,0.02); }
        .password-card:active { cursor: grabbing; }
        .password-card.dragging { opacity: 0.3; transform: scale(0.98); }
        .password-card:hover { transform: translateX(5px); border-left: 4px solid var(--accent); }

        /* Tag Colors */
        .tag { font-size: 11px; padding: 2px 10px; border-radius: 12px; font-weight: 600; margin-left: 8px; text-transform: uppercase; }
        .tag-social { background: #e1f0ff; color: #0078d4; }
        .tag-game { background: #dff6dd; color: #107c10; }
        .tag-website { background: #f3f2f1; color: #323130; }

        /* Bottom Panel */
        .bottom-panel { padding: 15px 25px; background: rgba(255, 255, 255, 0.5); border-top: 1px solid var(--border-color); }
        .input-grid { display: grid; grid-template-columns: 1fr 1fr 1fr 1.2fr; gap: 10px; margin-bottom: 10px; }
        .win-input { padding: 9px 12px; border-radius: 6px; border: 1px solid var(--border-color); background: white; font-size: 13px; outline: var(--accent) solid 1.5px; }
        .btn-win { padding: 9px 18px; background: var(--accent); color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: 600; font-size: 13px; }
        .btn-outline { background: white; color: #333; border: 1px solid #ddd; }
        .btn-outline:hover { background: #f3f3f3; }
    </style>
</head>
<body>

<div class="window">
    <div class="title-bar">
        <div style="display:flex; align-items:center; gap:10px;">
            <img src="https://img.icons8.com/color/48/microsoft-shield.png" width="22"/>
            <span style="font-size:12px; font-weight:600; color:#333;">iSafe Vault Pro</span>
        </div>
        <div id="status" style="font-size:11px; color:#666;">Ready to Secure</div>
    </div>

    <div class="app-body">
        <div class="sidebar">
            <div class="nav-item active" onclick="setCategory('All', this)">🌐 All Items</div>
            <div class="nav-item" onclick="setCategory('Social', this)">👥 Social</div>
            <div class="nav-item" onclick="setCategory('Game', this)">🎮 Game</div>
            <div class="nav-item" onclick="setCategory('Website', this)">🌍 Website</div>
            
            <div id="trashBin" class="nav-item">🗑️ Drop here to Delete</div>
        </div>

        <div class="content">
            <input type="text" id="search" class="search-box" placeholder="Search by name or URL..." onkeyup="fetchData()">
            <div id="passList"></div>
        </div>
    </div>

    <div class="bottom-panel">
        <div class="input-grid">
            <input type="password" id="mKey" class="win-input" placeholder="Master Key 🔑" style="border: 2px solid var(--accent);">
            <input type="text" id="fSite" class="win-input" placeholder="Site Name">
            <input type="text" id="fUser" class="win-input" placeholder="Username">
            <div style="display:flex; gap:5px;">
                <input type="text" id="fPass" class="win-input" placeholder="Password" style="flex:1">
                <button class="btn-win btn-outline" onclick="generateRandomPass()" title="Generate Random Password">🎲</button>
            </div>
        </div>
        <div style="display:flex; justify-content: space-between; align-items:center;">
            <div style="font-size:11px; color:#777;">🔐 Your data is encrypted locally before being uploaded.</div>
            <div style="display:flex; gap:10px;">
                <select id="fCat" class="win-input" style="width:130px;">
                    <option value="Social">Social</option>
                    <option value="Game">Game</option>
                    <option value="Website">Website</option>
                </select>
                <button class="btn-win" onclick="saveData()">💾 Save Account</button>
            </div>
        </div>
    </div>
</div>

<script>
    const _supabase = supabase.createClient(
        'https://lvbrkqxutvtbjiacovgu.supabase.co',
        'sb_publishable_N4WVDMv2H3a1iwM5IrJseA_TOdb6M5b'
    );

    let currentCat = 'All';

    // Fetch Data
    async function fetchData() {
        const search = document.getElementById('search').value;
        const key = document.getElementById('mKey').value;
        
        document.getElementById('status').innerText = "Syncing with Cloud...";
        
        let query = _supabase.from('passwords').select('*').ilike('site', `%${search}%`);
        if(currentCat !== 'All') query = query.eq('category', currentCat);
        
        const { data, error } = await query.order('site');
        
        if(!error) {
            renderList(data, key);
            document.getElementById('status').innerText = `Total: ${data.length} accounts found`;
        }
    }

    // Render List
    function renderList(data, key) {
        const list = document.getElementById("passList");
        list.innerHTML = "";
        
        data.forEach(item => {
            let passVal = "••••••••";
            if(key) {
                try {
                    const bytes = CryptoJS.AES.decrypt(item.pass, key);
                    passVal = bytes.toString(CryptoJS.enc.Utf8) || "❌ ERROR";
                } catch(e) { passVal = "WRONG KEY"; }
            }

            const card = document.createElement('div');
            card.className = 'password-card';
            card.draggable = true;
            
            card.ondragstart = (e) => {
                card.classList.add('dragging');
                e.dataTransfer.setData('text/plain', item.id);
            };
            card.ondragend = () => card.classList.remove('dragging');

            const tagClass = `tag-${item.category.toLowerCase()}`;

            card.innerHTML = `
                <div>
                    <strong>${item.site}</strong> <span class="tag ${tagClass}">${item.category}</span><br>
                    <small style="color:#666;">User: ${item.user}</small>
                </div>
                <div style="display:flex; align-items:center; gap:10px;">
                    <code style="background:#f0f0f0; padding:4px 8px; border-radius:4px; font-family:monospace;">${passVal}</code>
                    <button class="btn-win btn-outline" style="font-size:11px;" onclick="copyClipboard('${passVal}')">Copy</button>
                </div>`;
            list.appendChild(card);
        });
    }

    // Save Data
    async function saveData() {
        const mKey = document.getElementById('mKey').value;
        const site = document.getElementById('fSite').value;
        const user = document.getElementById('fUser').value;
        const pass = document.getElementById('fPass').value;
        const cat = document.getElementById('fCat').value;

        if(!mKey) return alert("You MUST enter a Master Key to encrypt your data!");
        if(!site || !pass) return alert("Please fill in Site and Password!");

        const encrypted = CryptoJS.AES.encrypt(pass, mKey).toString();
        const { error } = await _supabase.from('passwords').insert([{ site, user, pass: encrypted, category: cat }]);

        if(!error) {
            document.getElementById('fSite').value = '';
            document.getElementById('fUser').value = '';
            document.getElementById('fPass').value = '';
            fetchData();
        } else {
            alert("Database Error: " + error.message);
        }
    }

    // Trash System
    const trash = document.getElementById('trashBin');
    trash.ondragover = (e) => { e.preventDefault(); trash.classList.add('drag-over'); };
    trash.ondragleave = () => trash.classList.remove('drag-over');
    trash.ondrop = async (e) => {
        e.preventDefault();
        trash.classList.remove('drag-over');
        const id = e.dataTransfer.getData('text/plain');
        if(confirm("Are you sure you want to delete this account?")) {
            await _supabase.from('passwords').delete().eq('id', id);
            fetchData();
        }
    };

    // Utils
    function setCategory(cat, el) {
        currentCat = cat;
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        el.classList.add('active');
        fetchData();
    }

    function generateRandomPass() {
        const chars = "abcdefghijklnmopqrstuvwxyzABCDEFGHIJKLNMOPQRSTUVWXYZ0123456789!@#$%^&*";
        let res = "";
        for (let i = 0; i < 16; i++) res += chars.charAt(Math.floor(Math.random() * chars.length));
        document.getElementById('fPass').value = res;
    }

    function copyClipboard(t) {
        if(t.includes('•')) return alert("Enter Master Key to unlock first!");
        navigator.clipboard.writeText(t);
        alert("Password copied!");
    }

    // Event listener for Master Key real-time update
    document.getElementById('mKey').addEventListener('input', fetchData);

    fetchData(); 
</script>
</body>
</html>
